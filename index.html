<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Key Checker</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #121212; color: #0f0; font-family: 'Roboto Mono', monospace; padding: 40px; text-align: center; }
        h2 { color: #fff; margin-bottom: 20px; }
        
        .container { max-width: 600px; margin: 0 auto; background: #1e1e1e; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        input { 
            width: 100%; padding: 15px; margin-bottom: 15px; 
            background: #333; border: 1px solid #555; color: #fff; 
            border-radius: 8px; font-size: 14px; outline: none;
        }
        
        button { 
            width: 100%; padding: 15px; background: #2563eb; color: white; 
            border: none; border-radius: 8px; font-size: 16px; font-weight: bold; 
            cursor: pointer; transition: 0.3s; 
        }
        button:hover { background: #1d4ed8; }
        
        #result { 
            margin-top: 20px; text-align: left; white-space: pre-wrap; 
            background: #000; padding: 15px; border-radius: 8px; 
            border: 1px solid #333; min-height: 100px; display: none;
        }
        
        .success { color: #4ade80; }
        .error { color: #ef4444; }
        .badge { display: inline-block; background: #064e3b; color: #6ee7b7; padding: 2px 8px; border-radius: 4px; font-size: 12px; margin-left: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <h2>🔑 Gemini API Key Tester</h2>
        <p style="color:#aaa; font-size:12px; margin-bottom:20px;">Paste your API Key below to find supported models.</p>
        
        <input type="text" id="apiKey" placeholder="Paste your AIza... Key here">
        <button onclick="checkModels()">🔍 Check Available Models</button>
        
        <div id="result"></div>
    </div>

    <script>
        async function checkModels() {
            const key = document.getElementById('apiKey').value.trim();
            const resultBox = document.getElementById('result');
            
            if (!key) {
                alert("Please enter a key!");
                return;
            }

            resultBox.style.display = "block";
            resultBox.innerHTML = "Connecting to Google Servers... ⏳";

            try {
                // Fetch list of models
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${key}`);
                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error?.message || "Invalid Key");
                }

                if (data.models) {
                    let output = `<span class="success">✅ Key is Valid! Supported Models:</span>\n\n`;
                    
                    // Filter only models that can generate content (Chat models)
                    const chatModels = data.models.filter(m => 
                        m.supportedGenerationMethods.includes("generateContent")
                    );

                    chatModels.forEach(model => {
                        const name = model.name.replace('models/', '');
                        output += `🔹 <b>${name}</b>\n`;
                    });

                    resultBox.innerHTML = output;
                } else {
                    resultBox.innerHTML = "<span class='error'>⚠️ Key valid but no models found.</span>";
                }

            } catch (error) {
                resultBox.innerHTML = `<span class="error">❌ ERROR: ${error.message}</span>`;
            }
        }
    </script>

</body>
</html>
