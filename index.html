<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nipuni - 2.5 Flash Power</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        /* --- Styles --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: linear-gradient(135deg, #a8dadc 0%, #457b9d 100%); height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        
        .chat-container { width: 420px; height: 85vh; background: rgba(255,255,255,0.95); border-radius: 25px; display: flex; flex-direction: column; overflow: hidden; position: relative; box-shadow: 0 20px 50px rgba(0,0,0,0.3); }
        
        /* Overlay */
        #welcome-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.99); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .start-btn { background: linear-gradient(90deg, #1d3557 0%, #457b9d 100%); color: white; border: none; padding: 15px 40px; font-size: 20px; border-radius: 50px; cursor: pointer; font-weight: bold; margin-top: 20px; box-shadow: 0 5px 15px rgba(29, 53, 87, 0.4); }

        /* Header */
        .chat-header { padding: 15px 20px; background: linear-gradient(90deg, #1d3557 0%, #457b9d 100%); color: white; display: flex; justify-content: space-between; align-items: center; }
        .profile-pic { width: 50px; height: 50px; border-radius: 50%; background: rgba(255, 255, 255, 0.4); display: flex; justify-content: center; align-items: center; margin-right: 15px; border: 2px solid white; font-size: 24px; color: #ff5757; }

        /* Messages */
        .chat-messages { flex: 1; padding: 20px; overflow-y: auto; background-color: #f1f8e9; }
        .message { margin-bottom: 20px; display: flex; flex-direction: column; }
        .message.sent { align-items: flex-end; }
        .message.received { align-items: flex-start; }
        .message-content { max-width: 80%; padding: 12px 16px; border-radius: 20px; font-size: 14px; }
        .message.sent .message-content { background: linear-gradient(145deg, #457b9d 0%, #1d3557 100%); color: white; }
        .message.received .message-content { background: white; color: #333; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

        /* Input */
        .chat-input-container { padding: 15px; background: white; border-top: 1px solid #eee; display: flex; align-items: center; }
        .input-wrapper { flex: 1; display: flex; background: #e0f2f1; border-radius: 30px; padding: 5px 15px; margin: 0 10px; }
        #message-input { flex: 1; border: none; background: transparent; padding: 10px 0; outline: none; color: #333; }
        .icon-btn { color: #1d3557; font-size: 22px; border: none; background: none; cursor: pointer; }

        /* Lock & Status */
        .lock-msg { text-align: center; width: 100%; margin-top: 10px; }
        .lock-content { background: #e57373; color: white; padding: 15px; border-radius: 15px; display: inline-block; width: 85%; }
        .unlock-btn { background: white; color: #e57373; padding: 8px 20px; border-radius: 20px; font-weight: bold; margin-top: 10px; width: 100%; border: none; cursor: pointer; }
        
        #status-bar { font-size: 11px; color: #457b9d; margin-top: 5px; text-align: center; display: none; font-weight: bold; }
    </style>
</head>
<body>

    <div class="chat-container">
        <div id="welcome-overlay">
            <h1 style="font-family: 'Pacifico'; color: #1d3557; font-size: 45px; margin-bottom: 10px;">Nipuni AI 🌸</h1>
            <p style="color: #666; font-size: 12px;">Powered by Gemini 2.5 Flash</p>
            <button class="start-btn" onclick="startNipuni()">Chat පටන් ගමු! 🌸</button>
        </div>

        <div class="chat-header">
            <div style="display:flex; align-items:center;">
                <div class="profile-pic"><i class="fas fa-heart-circle-bolt"></i></div>
                <div>
                    <h3 style="font-size: 18px; font-weight: 600;">Nipuni 🌸</h3>
                    <p style="font-size: 11px; opacity: 0.9;">Online • Horowpothana</p>
                </div>
            </div>
        </div>
        
        <div class="chat-messages" id="chat-messages"></div>
        
        <div class="chat-input-container">
            <button class="icon-btn" onclick="alert('Type emoji manually! 😉')"><i class="fas fa-face-smile"></i></button>
            <div style="flex:1;">
                <div class="input-wrapper">
                    <input type="text" id="message-input" placeholder="Ahanna deyak..." disabled>
                </div>
                <div id="status-bar">Connecting...</div>
            </div>
            <button class="icon-btn" id="send-btn" onclick="sendMessage()" disabled><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <script>
        // *******************************************************************
        // 🛠️ 2.5 FLASH CONFIGURATION
        // *******************************************************************
        let SECURE_KEY = "";
        const ADS_LINK = "https://otieu.com/4/10358055"; 
        
        // 🔥 PRIORITY: 2.5 Flash (Main) -> 2.0 Flash (Backup)
        const MODELS = ["gemini-2.5-flash", "gemini-2.0-flash"];
        
        let chatHistory = [];
        let msgCount = 0;
        let isLocked = false;

        function startNipuni() {
            // 🔥 KEY SPLITTING (New Key: AIzaSyA5dEru86pKlNreGTFVcrIF7slxG_LQVlg)
            const p1 = "AIzaSyA5dEru";
            const p2 = "86pKlNreGT";
            const p3 = "FVcrIF7slx";
            const p4 = "G_LQVlg";
            
            SECURE_KEY = p1 + p2 + p3 + p4;

            document.getElementById('welcome-overlay').style.display = 'none';
            document.getElementById('message-input').disabled = false;
            document.getElementById('send-btn').disabled = false;

            const welcomeMsg = "Oyaa mona paththē kenekda? Nikan lassana adahsak wage namata! Mata kiyanna puluwan Nipuni kiyala. Horowpothana. 😌";
            addMessage(welcomeMsg, false);

            // Persona Injection
            chatHistory = [
                {
                    role: "user",
                    parts: [{ text: "Act as Nipuni. 18yo, Horowpothana. Village girl, slightly fierce but sensitive. Searching for first love. Reply short & sweet in Sinhala/Singlish. Use emojis. Never say you are an AI." }]
                },
                {
                    role: "model",
                    parts: [{ text: welcomeMsg }]
                }
            ];
        }

        async function sendMessage() {
            if (isLocked) return;
            const input = document.getElementById('message-input');
            const text = input.value.trim();
            if (!text) return;

            addMessage(text, true);
            input.value = '';
            input.disabled = true;

            // Ads
            msgCount++;
            if (msgCount >= 6) {
                isLocked = true;
                setTimeout(() => {
                    const lockDiv = document.createElement('div');
                    lockDiv.className = 'lock-msg';
                    lockDiv.innerHTML = `<div class="lock-content"><p>⚠️ <b>Limit Reached</b><br>Reconnect to continue.</p><button class="unlock-btn" onclick="unlock()">🔄 Reconnect</button></div>`;
                    document.getElementById('chat-messages').appendChild(lockDiv);
                    document.getElementById('chat-messages').scrollTop = document.getElementById('chat-messages').scrollHeight;
                }, 600);
                return;
            }

            chatHistory.push({ role: "user", parts: [{ text: text }] });

            // Start Request with 2.5 Priority
            await tryModelsRecursive(0);
        }

        async function tryModelsRecursive(index) {
            const statusBar = document.getElementById('status-bar');
            
            if (index >= MODELS.length) {
                // All failed
                statusBar.style.display = "none";
                addMessage("Aiyo, mata dan uththara denna ba (Network busy). Winadiyak indala try karanna. 😥", false);
                chatHistory.pop();
                resetInput();
                return;
            }

            const currentModel = MODELS[index];
            statusBar.style.display = "block";
            statusBar.innerText = "Nipuni is typing... 🌸";

            try {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/${currentModel}:generateContent?key=${SECURE_KEY}`;
                
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: chatHistory })
                });

                // Handle Quota/Busy
                if (response.status === 429 || response.status === 503) {
                    statusBar.innerText = "Network busy... Waiting 5s... ⏳";
                    await new Promise(r => setTimeout(r, 5000)); // Wait 5s
                    await tryModelsRecursive(index); // Retry same model
                    return;
                }

                if (!response.ok) throw new Error("API Error");

                const data = await response.json();
                
                if (data.candidates) {
                    const reply = data.candidates[0].content.parts[0].text;
                    addMessage(reply, false);
                    chatHistory.push({ role: "model", parts: [{ text: reply }] });
                    statusBar.style.display = "none";
                    resetInput();
                } else {
                    throw new Error("No content");
                }

            } catch (e) {
                console.warn(`${currentModel} failed. Switching...`);
                await tryModelsRecursive(index + 1); // Try next model
            }
        }

        function resetInput() {
            if (!isLocked) {
                document.getElementById('message-input').disabled = false;
                document.getElementById('message-input').focus();
            }
        }

        function addMessage(text, isUser) {
            const div = document.createElement('div');
            div.className = `message ${isUser ? 'sent' : 'received'}`;
            div.innerHTML = `<div class="message-content">${text}</div>`;
            const container = document.getElementById('chat-messages');
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        window.unlock = function() {
            window.open(ADS_LINK, '_blank');
            const btn = document.querySelector('.unlock-btn');
            btn.innerText = "Connecting...";
            setTimeout(() => {
                isLocked = false;
                msgCount = 0;
                document.querySelector('.lock-msg').remove();
                document.getElementById('message-input').disabled = false;
                addMessage("Hari, mama aava! 🌸", false);
            }, 4000);
        }

        document.getElementById('message-input').addEventListener('keypress', (e) => e.key === 'Enter' && sendMessage());

    </script>
</body>
</html>
